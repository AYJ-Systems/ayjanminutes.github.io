<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Ayjan Minutes</title>
  <link rel="icon" type="image/x-icon" href="app1.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1e1e2e;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #cdd6f4;
    }

    .card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 440px;
      width: 90%;
      text-align: center;
    }

    .icon-wrap {
      position: relative;
      width: 72px;
      margin: 0 auto 24px;
    }

    .app-icon {
      width: 72px;
      height: 72px;
      display: block;
    }

    .checkmark {
      position: absolute;
      bottom: -6px;
      right: -10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #181825;
      border: 2px solid #a6e3a1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkmark svg {
      width: 14px;
      height: 14px;
      stroke: #a6e3a1;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #cba6f7;
      margin-bottom: 12px;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #a6adc8;
    }

    .divider {
      border: none;
      border-top: 1px solid #313244;
      margin: 28px 0;
    }

    .app-name {
      font-size: 0.85rem;
      color: #6c7086;
    }

    .app-name span {
      color: #cba6f7;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <img class="app-icon" src="app1.ico" alt="Ayjan Minutes" />
      <div class="checkmark">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
    </div>

    <h1>Thank You for Upgrading</h1>
    <p>Your payment was successful. Ayjan Minutes Pro is being activated on your account &mdash; your limits will lift within a minute.</p>

    <hr class="divider" />

    <p class="app-name"><span>Ayjan Minutes</span> — close this tab and return to the app.</p>
  </div>
</body>
</html>
